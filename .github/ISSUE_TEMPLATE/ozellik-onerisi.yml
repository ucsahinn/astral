name: Özellik önerisi
description: Astral ürün sınırı içinde bir geliştirme önerin
title: "[ÖNERİ] "
labels: ["iyileştirme", "inceleme-gerekli"]
body:
  - type: checkboxes
    id: contract
    attributes:
      label: Ürün sözleşmesi
      options:
        - label: Öneri yalnızca Astral'ın seçilebilir hedef/preset kapsamındadır.
          required: true
        - label: Tüm PC, tüm tarayıcı, sistem geneli VPN, DNS veya başka geniş kapsamlı bypass motoru istemiyorum.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Çözülecek sorun
      description: Çözümden önce kullanıcı sorununu açıklayın.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Önerilen davranış
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Kabul ölçütleri
    validations:
      required: true
