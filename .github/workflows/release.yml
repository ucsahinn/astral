name: Yayın

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Yayınlanacak tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Windows x64 yayını
    runs-on: windows-2025
    timeout-minutes: 20
    environment:
      name: release

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Yayın tag ve sürümünü doğrula
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Yayın tag'i SemVer formatında olmalı: $tag"
          }

          git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
          $tagCommit = (git rev-list -n 1 $tag).Trim()
          $headCommit = (git rev-parse HEAD).Trim()
          if ($tagCommit -ne $headCommit) {
            throw "Checkout edilen commit tag ile eşleşmiyor. tag=$tagCommit head=$headCommit"
          }

          $tagVersion = $tag.TrimStart('v')
          $versionedProjects = @(
            'src/Discorder.App/Discorder.App.csproj',
            'src/Discorder.Updater/Discorder.Updater.csproj'
          )
          foreach ($projectPath in $versionedProjects) {
            $project = [xml](Get-Content -Raw -LiteralPath $projectPath)
            $projectVersion = $project.Project.PropertyGroup.Version
            if ($projectVersion -ne $tagVersion) {
              throw "Proje sürümü tag ile eşleşmiyor. project=$projectPath version=$projectVersion tag=$tagVersion"
            }
          }

      - name: .NET kur
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Paket üret
        shell: pwsh
        env:
          DISCORDER_CODESIGN_PFX_B64: ${{ secrets.DISCORDER_CODESIGN_PFX_B64 }}
          DISCORDER_CODESIGN_PFX_PASSWORD: ${{ secrets.DISCORDER_CODESIGN_PFX_PASSWORD }}
        run: |
          $signArgs = @()
          $certificatePath = Join-Path $env:RUNNER_TEMP 'discorder-codesign.pfx'

          try {
            if (-not [string]::IsNullOrWhiteSpace($env:DISCORDER_CODESIGN_PFX_B64)) {
              [IO.File]::WriteAllBytes(
                $certificatePath,
                [Convert]::FromBase64String($env:DISCORDER_CODESIGN_PFX_B64))
              $signArgs += @(
                '-CodeSigningCertificatePath',
                $certificatePath
              )
            }
            ./scripts/build-release.ps1 @signArgs
          }
          finally {
            if (Test-Path -LiteralPath $certificatePath) {
              Remove-Item -LiteralPath $certificatePath -Force
            }
          }

      - name: Yayın notu ve SHA-256 hazırla
        id: package
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $version = $tag.TrimStart('v')
          $archive = Get-ChildItem -LiteralPath artifacts -Filter "Discorder-$version-win-x64.zip" |
            Select-Object -First 1
          if ($null -eq $archive) {
            throw "Yayın arşivi bulunamadı: Discorder-$version-win-x64.zip"
          }

          $shaPath = Join-Path 'artifacts' "Discorder-$version-win-x64.sha256.txt"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive.FullName).Hash
          Set-Content `
            -LiteralPath $shaPath `
            -Value "$hash  $($archive.Name)" `
            -Encoding ASCII

          $signingStatusPath = Join-Path 'artifacts' 'signing-status.txt'
          $signingStatus = 'unsigned'
          if (Test-Path -LiteralPath $signingStatusPath) {
            $signingStatus = (Get-Content -Raw -LiteralPath $signingStatusPath).Trim()
          }

          if ($signingStatus -eq 'signed') {
            $signingText = 'Kod imzalama: Authenticode imzalı paket.'
          }
          else {
            $signingText = 'Kod imzalama: imzasız paket. Güven sınırı GitHub yayın yetkisi, release yolu, asset digest, SHA-256 dosyası ve manifest doğrulamasıdır.'
          }

          $notesPath = Join-Path 'artifacts' "release-notes-$tag.md"
          $versionedNotesPath = Join-Path 'docs/releases' "$tag.md"
          if (Test-Path -LiteralPath $versionedNotesPath) {
            $notes = Get-Content -Raw -LiteralPath $versionedNotesPath
          }
          else {
            $releaseDate = Get-Date -Format 'yyyy-MM-dd'
            $notes = @"
          # Discorder $tag - Portable Windows Discord bağlantı yöneticisi

          Tarih: $releaseDate

          Discorder $version, Windows'ta Discord bağlantısını sade bir arayüzle yöneten portable masaüstü uygulamasıdır.
          "@
          }

          $releaseAssetSummary = @"

          ## Yayın Asset'leri

          - $($archive.Name)
          - $(Split-Path -Leaf $shaPath)
          - SHA-256: $hash
          - $signingText
          "@

          ($notes.TrimEnd() + $releaseAssetSummary) |
            Set-Content -LiteralPath $notesPath -Encoding UTF8

          "archive=$($archive.FullName)" >> $env:GITHUB_OUTPUT
          "sha=$shaPath" >> $env:GITHUB_OUTPUT
          "notes=$notesPath" >> $env:GITHUB_OUTPUT
          "signed=$signingStatus" >> $env:GITHUB_OUTPUT

      - name: GitHub Release yayınla
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_ARCHIVE: ${{ steps.package.outputs.archive }}
          RELEASE_SHA: ${{ steps.package.outputs.sha }}
          RELEASE_NOTES: ${{ steps.package.outputs.notes }}
        run: |
          $tag = $env:RELEASE_TAG
          $repo = $env:RELEASE_REPOSITORY
          $releaseTitle = "Discorder $tag - Portable Windows Discord bağlantı yöneticisi"
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            $existingAssetNames = gh release view $tag --repo $repo --json assets --jq '.assets[].name'
            $archiveName = [IO.Path]::GetFileName($env:RELEASE_ARCHIVE)
            $shaName = [IO.Path]::GetFileName($env:RELEASE_SHA)
            if ($existingAssetNames -contains $archiveName -or $existingAssetNames -contains $shaName) {
              throw "Release $tag zaten bu asset adlarını içeriyor. Güvenli yayın için clobber kullanılmıyor."
            }

            gh release upload $tag `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_SHA `
              --repo $repo
            gh release edit $tag `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $env:RELEASE_NOTES `
              --latest
          }
          else {
            gh release create $tag `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_SHA `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $env:RELEASE_NOTES `
              --latest
          }
