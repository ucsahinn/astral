name: Yayın

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Yayınlanacak tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Windows x64 yayını
    runs-on: windows-2025
    timeout-minutes: 20
    environment:
      name: release

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: .NET kur
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Paket üret
        shell: pwsh
        env:
          DISCORDER_CODESIGN_PFX_B64: ${{ secrets.DISCORDER_CODESIGN_PFX_B64 }}
          DISCORDER_CODESIGN_PFX_PASSWORD: ${{ secrets.DISCORDER_CODESIGN_PFX_PASSWORD }}
        run: |
          $signArgs = @()
          $certificatePath = Join-Path $env:RUNNER_TEMP 'discorder-codesign.pfx'
          if ([string]::IsNullOrWhiteSpace($env:DISCORDER_CODESIGN_PFX_B64)) {
            throw 'Discorder otomatik güncelleme yayını için DISCORDER_CODESIGN_PFX_B64 secret zorunludur.'
          }

          try {
            [IO.File]::WriteAllBytes(
              $certificatePath,
              [Convert]::FromBase64String($env:DISCORDER_CODESIGN_PFX_B64))
            $signArgs += @(
              '-CodeSigningCertificatePath',
              $certificatePath,
              '-RequireCodeSigning'
            )
            ./scripts/build-release.ps1 @signArgs
          }
          finally {
            if (Test-Path -LiteralPath $certificatePath) {
              Remove-Item -LiteralPath $certificatePath -Force
            }
          }

      - name: Yayın notu ve SHA-256 hazırla
        id: package
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $version = $tag.TrimStart('v')
          $archive = Get-ChildItem -LiteralPath artifacts -Filter "Discorder-$version-win-x64.zip" |
            Select-Object -First 1
          if ($null -eq $archive) {
            throw "Yayın arşivi bulunamadı: Discorder-$version-win-x64.zip"
          }

          $shaPath = Join-Path 'artifacts' "Discorder-$version-win-x64.sha256.txt"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive.FullName).Hash
          Set-Content `
            -LiteralPath $shaPath `
            -Value "$hash  $($archive.Name)" `
            -Encoding ASCII

          $signingStatusPath = Join-Path 'artifacts' 'signing-status.txt'
          $signingStatus = 'unsigned'
          if (Test-Path -LiteralPath $signingStatusPath) {
            $signingStatus = (Get-Content -Raw -LiteralPath $signingStatusPath).Trim()
          }

          if ($signingStatus -eq 'signed') {
            $signingText = 'Kod imzalama: Authenticode imzalı paket.'
          }
          else {
            throw 'Public otomatik güncelleme yayını imzalı paket gerektirir.'
          }

          $releaseDate = Get-Date -Format 'yyyy-MM-dd'
          $notesPath = Join-Path 'artifacts' "release-notes-$tag.md"
          $notes = @"
          # Discorder $tag - Portable Windows Discord bağlantı yöneticisi

          Tarih: $releaseDate

          Discorder $version, Windows'ta Discord bağlantısını sade ve güvenli bir arayüzle yönetmek için hazırlanan portable masaüstü uygulamasının güncel sürümüdür.

          ## Kısa özet

          Bu sürüm; güncelleme deneyimini, portable ZIP davranışını, Türkçe arayüz metinlerini ve public güven sınırlarını netleştirir.

          ## Neler değişti?

          - Güncelleme düğmesi önce yalnızca yeni sürüm denetler.
          - Yeni sürüm bulunursa ayrı ve belirgin `Yükle` düğmesi görünür.
          - `Yükle`, denetimde bulunan aynı sürümü indirir ve doğrular.
          - Güncelleme paketi `discorder.update-manifest.json` ile eşleştirilir.
          - Otomatik güncelleme yayını Authenticode imzalı paket gerektirir.
          - Portable güncelleme mevcut çıkarılmış Discorder klasörünü hedefler.
          - Güncelleme helper'ı mevcut uygulama kapandıktan sonra dosyaları yedekleyerek değiştirir; hata olursa önceki dosyaları geri taşır.
          - UI metinleri kısa, sakin ve kullanıcı odaklı hale getirildi.
          - Önemli düğmelere doğal Türkçe tooltip'ler eklendi.

          ## Neden önemli?

          Kullanıcı artık önce güncellemeyi denetler, sonra isterse bulunan sürümü yükler. Böylece kontrol edilmemiş veya farklı bir paket kurulmaz. Portable kullanımda hangi klasörün güncelleneceği ve hangi `Discorder.exe` dosyasının yeniden çalışacağı nettir.

          ## Kurulum

          - $($archive.Name) dosyasını indirin.
          - Yanındaki SHA-256 dosyasıyla arşivi kontrol edin.
          - ZIP'i kalıcı bir klasöre çıkarın.
          - `Discorder.exe` dosyasını çalıştırın.

          ## Uygulama içi güncelleme

          - **Güncelle** önce yeni sürüm olup olmadığını denetler.
          - Yeni sürüm varsa **Yükle** düğmesi görünür.
          - Paket staging alanına indirilir, doğrulanır ve mevcut portable klasöre uygulanır.
          - Başarılı olursa yeni `Discorder.exe` yeniden başlatılır.

          ## Portable ZIP notu

          Discorder hangi çıkarılmış klasörden çalışıyorsa güncelleme hedefi o klasördür. Mevcut kısayollar ve Windows başlangıç kaydı aynı executable yolunu kullanmaya devam eder.

          ## Güvenlik ve güven sınırları

          - Manuel ZIP indirmesinde SHA-256 dosyasını kontrol edin.
          - Uygulama içi otomatik güncelleme imzasız veya doğrulanamayan paketi uygulamaz.
          - Discorder sistem DNS ayarını kalıcı değiştirmez.
          - Discorder resmi Discord, Cloudflare veya WireSock ürünü değildir.

          ## Bilinen sınırlar

          - GitHub'a erişilemeyen ağlarda güncelleme denetimi başarısız olabilir.
          - Yavaş bağlantılarda indirme zaman aşımı yaşanırsa mevcut sürüm çalışmaya devam eder.
          - İlk WireSock kurulumu Windows yönetici onayı isteyebilir.

          ## Asset listesi

          - $($archive.Name)
          - $(Split-Path -Leaf $shaPath)
          - SHA-256: $hash
          - $signingText

          ## Doğrulama

          - scripts/build-release.ps1 geçti.
          - Core ve Windows render testleri geçti.
          - Release arşivi self-contained Windows x64 olarak üretildi.
          "@
          $notes | Set-Content -LiteralPath $notesPath -Encoding UTF8

          "archive=$($archive.FullName)" >> $env:GITHUB_OUTPUT
          "sha=$shaPath" >> $env:GITHUB_OUTPUT
          "notes=$notesPath" >> $env:GITHUB_OUTPUT
          "signed=$signingStatus" >> $env:GITHUB_OUTPUT

      - name: GitHub Release yayınla
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_ARCHIVE: ${{ steps.package.outputs.archive }}
          RELEASE_SHA: ${{ steps.package.outputs.sha }}
          RELEASE_NOTES: ${{ steps.package.outputs.notes }}
        run: |
          $tag = $env:RELEASE_TAG
          $repo = $env:RELEASE_REPOSITORY
          $releaseTitle = "Discorder $tag - Portable Windows Discord bağlantı yöneticisi"
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            $existingAssetNames = gh release view $tag --repo $repo --json assets --jq '.assets[].name'
            $archiveName = [IO.Path]::GetFileName($env:RELEASE_ARCHIVE)
            $shaName = [IO.Path]::GetFileName($env:RELEASE_SHA)
            if ($existingAssetNames -contains $archiveName -or $existingAssetNames -contains $shaName) {
              throw "Release $tag zaten bu asset adlarını içeriyor. Güvenli yayın için clobber kullanılmıyor."
            }

            gh release upload $tag `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_SHA `
              --repo $repo
            gh release edit $tag `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $env:RELEASE_NOTES `
              --latest
          }
          else {
            gh release create $tag `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_SHA `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $env:RELEASE_NOTES `
              --latest
          }
